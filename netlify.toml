[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "build"

[build.environment]
  CI = "true"
  PUBLIC_URL = "/"

[[redirects]]
  from = "/api/*"
  to = "https://prolux-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
